<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="glam" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.5" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  
  <g filter="url(#shadow)">
    <!-- Stylized 'i' -->
    <circle cx="256" cy="144" r="52" fill="url(#glam)" />
    <!-- Rounded rectangle for the stem -->
    <rect x="212" y="224" width="88" height="196" rx="44" fill="url(#glam)" />
    
    <!-- Sparkle 1 (Top right) -->
    <path d="M370,80 Q380,105 405,115 Q380,125 370,150 Q360,125 335,115 Q360,105 370,80 Z" fill="#c7d2fe" />
    
    <!-- Sparkle 2 (Bottom left) -->
    <path d="M120,320 Q130,335 145,345 Q130,355 120,370 Q110,355 95,345 Q110,335 120,320 Z" fill="#e0e7ff" />
  </g>
</svg>
